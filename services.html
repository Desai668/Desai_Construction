<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    min-height:100vh;
    background:url("Images/Background.png") no-repeat center/cover;
    color:white;
}

/* TITLE */
.title{
    text-align:center;
    font-family:'Bebas Neue', sans-serif;
    font-size:70px;
    color:#f5c04a;
    margin-top:20px;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:center;
    gap:100px;
    margin-top:20px;
    flex-wrap:wrap;
}

/* NAV LINKS */
.navbar a{
    position: relative;
    text-decoration:none;
    color:white;
    font-family:'Bebas Neue', sans-serif;
    font-size:28px;
    transition:0.3s;
}

/* ACTIVE */
.navbar .active{
    color:#f5c04a;
}

/* UNDERLINE */
.navbar a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#f5c04a;
    transition:0.4s;
}

.navbar a:hover{
    color:#f5c04a;
}

.navbar a:hover::after{
    width:100%;
}

/* SERVICES TITLE */
.services-title{
    text-align:center;
    color:#f5c04a;
    font-family:'Bebas Neue', sans-serif;
    font-size:30px;
    margin-top:20px;
}

/* SERVICES */
.services{
    margin-top:80px;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-evenly;
    margin-bottom:80px;
    flex-wrap:wrap;
    gap:30px;
}

/* SECOND ROW */
.second{
    justify-content:center;
    gap:120px;
}

/* BUTTON */
.services button{
    background:#e8b84a;
    border:none;
    padding:20px 80px;
    font-size:22px;
    font-family:'Bebas Neue', sans-serif;
    cursor:pointer;
    transition:0.3s;
}

.services button:hover{
    transform:scale(1.08);
    background:white;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.popup.show{
    opacity:1;
    visibility:visible;
}

.popup-content{
    background:#e3b64a;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:600px;
    max-width:90%;
    transform:scale(0.7);
    transition:0.3s ease;
}

.popup.show .popup-content{
    transform:scale(1);
}

.popup-content h2{
    color:black;
    margin-bottom:20px;
    font-family:'Bebas Neue', sans-serif;
}

.popup-content img{
    width:100%;
    max-width:350px;
    border:4px solid black;
    margin-bottom:20px;
}

.popup-content p{
    color:black;
    font-family:'Poppins', sans-serif;
    font-weight:600;
}

.close{
    position:absolute;
    top:15px;
    right:25px;
    font-size:30px;
    cursor:pointer;
    color:black;
}

/* ✅ OWNER TEXT */
.owner{
    position:fixed;
    bottom:10px;
    left:15px;
    font-family:'Poppins', sans-serif;
    font-size:14px;
    color:rgba(255,255,255,0.7);
    letter-spacing:1px;
    z-index:1000;
}

/* MOBILE */
@media (max-width:768px){

    .title{
        font-size:40px;
    }

    .navbar{
        gap:30px;
    }

    .navbar a{
        font-size:20px;
    }

    .services button{
        padding:15px 40px;
        font-size:18px;
    }

    .second{
        gap:40px;
    }

    .popup-content{
        padding:20px;
    }
}

</style>
</head>

<body>

<h1 class="title">CONSTRUCTION WEB PAGE</h1>

<nav class="navbar">
    <a href="index.html">HOME</a>
    <a href="services.html" class="active">SERVICES</a>
    <a href="gallery.html">GALLERY</a>
    <a href="contact.html">CONTACT</a>
</nav>

<section class="services">

    <div class="row">
        <button onclick="openPopup('earth')">EARTH MOVERS</button>
        <button onclick="openPopup('civil')">CIVIL WORK CONTRACT</button>
        <button onclick="openPopup('cement')">CEMENT SHOP</button>
    </div>

    <div class="row second">
        <button onclick="openPopup('ply')">PLYWOODS</button>
        <button onclick="openPopup('bricks')">CONCRETE BRICKS</button>
    </div>

</section>

<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">×</span>
        <h2 id="popup-title"></h2>
        <img id="popup-img" src="">
        <p id="popup-text"></p>
    </div>
</div>

<!-- ✅ OWNER -->
<div class="owner">© 2026 Subodh Desai</div>

<script>

function openPopup(type){

    const popup = document.getElementById("popup");
    const title = document.getElementById("popup-title");
    const text = document.getElementById("popup-text");
    const img = document.getElementById("popup-img");

    popup.classList.add("show");

    if(type==="earth"){
        title.innerText="EARTH MOVERS";
        text.innerText="EXPERT EARTHMOVING AND EXCAVATION FOR ALL CONSTRUCTION NEEDS";
        img.src="Images/earthmovers.png";
    }

    if(type==="civil"){
        title.innerText="CIVIL WORK CONTRACT";
        text.innerText="COMPLETE BUILDING SOLUTIONS WITH QUALITY AND PRECISION";
        img.src="Images/earthmovers.png";
    }

    if(type==="cement"){
        title.innerText="CEMENT SHOP";
        text.innerText="HIGH QUALITY CEMENT FOR ALL TYPES OF CONSTRUCTION";
        img.src="Images/earthmovers.png";
    }

    if(type==="ply"){
        title.innerText="PLYWOODS";
        text.innerText="DURABLE AND PREMIUM WOOD SOLUTIONS";
        img.src="Images/earthmovers.png";
    }

    if(type==="bricks"){
        title.innerText="CONCRETE BRICKS";
        text.innerText="STRONG AND RELIABLE BUILDING MATERIALS";
        img.src="Images/earthmovers.png";
    }
}

function closePopup(){
    document.getElementById("popup").classList.remove("show");
}

window.onclick = function(e){
    const popup = document.getElementById("popup");
    if(e.target === popup){
        popup.classList.remove("show");
    }
}

</script>

</body>
</html>
