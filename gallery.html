<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    background:url("Images/Background.png") no-repeat center/cover;
    min-height:100vh;
    color:white;
    font-family:'Bebas Neue', sans-serif;
}

/* TITLE */
.title{
    text-align:center;
    font-size:70px;
    color:#f5c04a;
    margin-top:20px;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:center;
    gap:100px;
    margin-top:20px;
    flex-wrap:wrap;
}

/* NAV LINKS */
.navbar a{
    position: relative;
    text-decoration:none;
    color:white;
    font-size:28px;
    transition:0.3s;
}

/* ACTIVE */
.navbar .active{
    color:#f5c04a;
}

/* UNDERLINE HOVER */
.navbar a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#f5c04a;
    transition:0.4s;
}

.navbar a:hover{
    color:#f5c04a;
}

.navbar a:hover::after{
    width:100%;
}

/* SECTION TITLE */
.section-title{
    text-align:center;
    font-size:40px;
    margin:40px 0;
}

/* GALLERY GRID */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:30px;
    padding:0 50px 50px;
}

/* IMAGE STYLE */
.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.08);
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.popup.show{
    opacity:1;
    visibility:visible;
}

/* POPUP BOX */
.popup-content{
    background:#e3b64a;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:500px;
    max-width:90%;
    transform:scale(0.7);
    transition:0.3s;
}

.popup.show .popup-content{
    transform:scale(1);
}

/* POPUP CONTENT */
.popup-content h2{
    color:black;
    margin-bottom:15px;
}

.popup-content img{
    width:100%;
    max-width:350px;
    border:4px solid black;
    margin-bottom:15px;
}

.popup-content p{
    color:black;
    font-family:'Poppins', sans-serif;
    font-weight:600;
}

/* CLOSE */
.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    cursor:pointer;
}

/* ✅ OWNER TEXT */
.owner{
    position:fixed;
    bottom:10px;
    left:15px;
    font-family:'Poppins', sans-serif;
    font-size:14px;
    color:rgba(255,255,255,0.7);
    letter-spacing:1px;
    z-index:1000;
}

/* MOBILE */
@media(max-width:768px){
    .title{font-size:40px;}
    .navbar{gap:30px;}
    .navbar a{font-size:20px;}
}

</style>
</head>

<body>

<h1 class="title">CONSTRUCTION WEB PAGE</h1>

<nav class="navbar">
    <a href="index.html">HOME</a>
    <a href="services.html">SERVICES</a>
    <a href="gallery.html" class="active">GALLERY</a>
    <a href="contact.html">CONTACT</a>
</nav>

<h2 class="section-title">CONTRIBUTION</h2>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- POPUP -->
<div id="popup" class="popup">
    <span class="close" onclick="closePopup()">×</span>

    <div class="popup-content">
        <h2>EARTH MOVERS</h2>
        <img src="Images/earthmovers.png">
        <p>EXPERT EARTHMOVING AND EXCAVATION FOR ALL CONSTRUCTION NEEDS</p>
    </div>
</div>

<!-- ✅ OWNER TEXT -->
<div class="owner">© 2026 Subodh Desai</div>

<script>

/* AUTO GENERATE 50 IMAGES */
const gallery = document.getElementById("gallery");

for(let i=1;i<=50;i++){
    let img = document.createElement("img");
    img.src = "Images/earthmovers.png";
    img.onclick = () => openPopup();
    gallery.appendChild(img);
}

/* OPEN POPUP */
function openPopup(){
    document.getElementById("popup").classList.add("show");
}

/* CLOSE POPUP */
function closePopup(){
    document.getElementById("popup").classList.remove("show");
}

/* CLICK OUTSIDE CLOSE */
window.onclick = function(e){
    let popup = document.getElementById("popup");
    if(e.target === popup){
        popup.classList.remove("show");
    }
}

</script>

</body>
</html>
