<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    background:url("Images/Background.png") no-repeat center/cover;
    min-height:100vh;
    color:white;
}

/* TITLE */
.title{
    text-align:center;
    font-family:'Bebas Neue';
    font-size:70px;
    color:#f5c04a;
    margin-top:20px;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:center;
    gap:120px;
    margin-top:20px;
    flex-wrap:wrap;
}

/* NAV LINKS */
.navbar a{
    position: relative;
    text-decoration:none;
    color:white;
    font-family:'Bebas Neue';
    font-size:28px;
    transition:0.3s;
}

.navbar .active{
    color:#f5c04a;
}

/* UNDERLINE */
.navbar a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    left:0;
    bottom:-5px;
    background:#f5c04a;
    transition:0.4s;
}

.navbar a:hover{
    color:#f5c04a;
}

.navbar a:hover::after{
    width:100%;
}

/* CONTAINER */
.container{
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    margin-top:80px;
    padding:0 100px;
}

/* LEFT */
.left{
    display:flex;
    gap:40px;
    align-items:stretch;
}

.image-box{
    width:220px;
}

.image-box img{
    width:110%;
    height:100%;
    object-fit:cover;
}

.details{
    font-family:'Poppins';
    font-size:24px;
    line-height:2;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* FORM */
.form-box{
    background:#e3b64a;
    padding:40px;
    width:450px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:420px;
}

.form-group{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.form-group label{
    font-family:'Bebas Neue';
    font-size:22px;
    color:black;
}

.form-group input,
.form-group textarea{
    width:60%;
    padding:10px;
    border:none;
    outline:none;
}

/* BUTTON */
.submit-btn{
    display:block;
    margin:30px auto 0;
    padding:15px 50px;
    border:none;
    border-radius:30px;
    background:#eee;
    font-family:'Bebas Neue';
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    transform:scale(1.08);
}

/* OWNER */
.owner{
    position:fixed;
    bottom:10px;
    left:15px;
    font-family:'Poppins';
    font-size:14px;
    color:rgba(255,255,255,0.7);
}

/* MOBILE */
@media(max-width:768px){
    .container{
        flex-direction:column;
        gap:40px;
        padding:20px;
    }

    .navbar{
        gap:30px;
    }

    .title{
        font-size:40px;
    }

    .form-box{
        width:100%;
    }

    .left{
        flex-direction:column;
        align-items:center;
    }

    .image-box{
        width:100%;
        height:250px;
    }

    .details{
        text-align:center;
    }

    .form-group{
        flex-direction:column;
        align-items:flex-start;
    }

    .form-group input,
    .form-group textarea{
        width:100%;
    }
}

</style>
</head>

<body>

<h1 class="title">CONSTRUCTION WEB PAGE</h1>

<nav class="navbar">
    <a href="index.html">HOME</a>
    <a href="services.html">SERVICES</a>
    <a href="gallery.html">GALLERY</a>
    <a href="contact.html" class="active">CONTACT</a>
</nav>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="image-box">
            <img src="Images/earthmovers.png">
        </div>

        <div class="details">
            <p>Hi, I'm Desai</p>
            <p>xyz@gmail.com</p>
            <p>8979777097</p>
            <p>Ranebennur, Karnataka</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="form-box">

        <div>
            <div class="form-group">
                <label>NAME</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>PHONE NO</label>
                <input type="text" id="phone" maxlength="10"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" 
                pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$" required>
            </div>

            <div class="form-group">
                <label>MESSAGE</label>
                <textarea id="message" required></textarea>
            </div>
        </div>

        <button class="submit-btn" onclick="sendWhatsApp()">SUBMIT</button>

    </div>

</div>

<div class="owner">© 2026 Subodh Desai</div>

<script>

function sendWhatsApp(){

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    // NAME
    if(name === ""){
        alert("Enter your name");
        return;
    }

    // PHONE VALIDATION
    let phonePattern = /^[0-9]{10}$/;
    if(!phonePattern.test(phone)){
        alert("Phone must be exactly 10 digits");
        return;
    }

    // EMAIL VALIDATION
    let emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
    if(!emailPattern.test(email)){
        alert("Enter valid Gmail (example@gmail.com)");
        return;
    }

    // MESSAGE
    if(message === ""){
        alert("Enter your message");
        return;
    }

    // WHATSAPP MESSAGE
    let text = `New Enquiry:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Email: ${email}%0A
Message: ${message}`;

    let url = `https://wa.me/917022985406?text=${text}`;

    window.open(url, "_blank");
}

</script>

</body>
</html>
