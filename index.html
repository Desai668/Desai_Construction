<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DESAI CONSTRUCTIONS</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ✅ FIXED BODY BACKGROUND */
body {
    min-height: 100vh;
    background-image: url("Images/Background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: scroll; /* important for mobile */
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    padding: 30px 20px;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 60px;
}

/* NAV LINKS */
.nav-links li a {
    position: relative;
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: white;
    transition: 0.3s;
}

/* ACTIVE */
.nav-links li a.active {
    color: #f5c04a;
}

/* UNDERLINE */
.nav-links li a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: #f5c04a;
    transition: 0.4s;
}

.nav-links li a:hover {
    color: #f5c04a;
}

.nav-links li a:hover::after {
    width: 100%;
}

/* HERO */
.hero {
    min-height: 85vh; /* ✅ instead of fixed height */
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* ANIMATION */
.content {
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TITLE */
.content h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    color: #f5c04a;
    letter-spacing: 3px;
    margin-bottom: 20px;
}

/* SUBTEXT */
.content p {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    font-weight: 600;
    margin-bottom: 40px;
}

/* BUTTON */
.explore-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 15px 40px;
    border-radius: 30px;
    background: #f5c04a;
    color: black;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s;
}

.explore-btn:hover {
    background: white;
    transform: scale(1.08);
}

/* OWNER */
.owner {
    position: fixed;
    bottom: 10px;
    left: 15px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
}

/* 📱 MOBILE FIX */
@media (max-width: 768px) {

    body {
        background-position: center top; /* important */
    }

    .nav-links {
        gap: 25px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .nav-links li a {
        font-size: 18px;
    }

    .content h1 {
        font-size: 48px;
    }

    .content p {
        font-size: 16px;
        letter-spacing: 2px;
    }

    .explore-btn {
        padding: 12px 25px;
        font-size: 18px;
    }
}

@media (max-width: 480px) {

    .content h1 {
        font-size: 36px;
    }

    .content p {
        font-size: 14px;
    }
}

</style>
</head>

<body>

<header>
    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html" class="active">HOME</a></li>
            <li><a href="services.html">SERVICES</a></li>
            <li><a href="gallery.html">GALLERY</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="content">
        <h1>DESAI CONSTRUCTIONS</h1>
        <p>ENGINEERING EXCELLENCE INTO EVERY PROJECT</p>
        <a href="services.html" class="explore-btn">EXPLORE</a>
    </div>
</section>

<div class="owner">© 2026 Subodh Desai</div>

<script>

/* ACTIVE LINK */
const currentPage = window.location.pathname.split("/").pop();
const links = document.querySelectorAll(".nav-links a");

links.forEach(link => {
    if(link.getAttribute("href") === currentPage){
        link.classList.add("active");
    }
});

</script>

</body>
</html>
